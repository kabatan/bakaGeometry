- error_or_internal_condition: no certifiable target-action quotient; coordinate root/RUR export flag; undercovered single-vector recurrence; plan/source/auth/child tamper
  mapped_solver_status: KernelAdmissionStatus::Declined for non-applicable admission; InvalidInput for coordinate-exporting quotient input; CertificateDesignGap for undercoverage; ImplementationBug for tamper/binding mismatch
  verdict: pass
  evidence: P8c tests and action_krylov.rs validation paths cover no-coordinate export rejection, undercoverage rejection, and auth/source tamper rejection.
  reviewer_rationale: P8c does not route failures to Unsupported or CertifiedNonFiniteTargetImage and does not emit candidate relations on missing coverage.
