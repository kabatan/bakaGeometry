phase_specific_checks:
- check_id: p8c-production-handle-boundary
  required_by: RGQ-021
  verdict: pass
  evidence: Reviewer found P8c uses ProductionProvenancedTargetQuotientHandle and not debug explicit handles in action_krylov.rs.
  reviewer_rationale: Production path is type-bound to the provenanced quotient/action primitive and does not accept debug explicit handles.
- check_id: p8c-only-verified-characteristic-coverage
  required_by: RGQ-044
  verdict: pass
  evidence: Reviewer found CoverageKind has only VerifiedCharacteristicSupportCoverage and P8c uses CertificateRoute::VerifiedCharacteristicSupportCoverage.
  reviewer_rationale: No weaker Krylov, block-Wiedemann, trace-power, or unchecked S(M_T)=0 proof is support-producing.
- check_id: p8c-characteristic-polynomial-output
  required_by: RGQ-044
  verdict: pass
  evidence: Reviewer found the emitted relation is built from the exact characteristic polynomial after exact Cayley-Hamilton verification.
  reviewer_rationale: The primitive computes characteristic_polynomial, verifies Cayley-Hamilton, and P8c emits that relation only after verification.
- check_id: p8c-undercoverage-regression
  required_by: RGQ-054
  verdict: pass
  evidence: p8c_undercovered_single_vector_recurrence_cannot_escape_as_support and algebra::krylov::single_vector_krylov_undercoverage_is_rejected are present and pass.
  reviewer_rationale: The regression demonstrates a single-vector recurrence misses an eigenvalue and cannot produce a relation unless full characteristic coverage is constructed.
- check_id: p8c-no-coordinate-export
  required_by: RGQ-021
  verdict: pass
  evidence: p8c_quotient_handle_rejects_coordinate_root_or_rur_export is present and passes.
  reviewer_rationale: Production quotient handles must expose no coordinate roots or full coordinate RUR before P8c can return a support relation.
appendix_override_checks:
- appendix_section: Appendix A section 19.4
  controlling_requirement: RGQ-044
  verdict: pass
  evidence: P8c accepts only VerifiedCharacteristicSupportCoverage despite Appendix A section 19.4 listing weaker possible coverage approaches.
  reviewer_rationale: The hardening override in RGQ-044/RGQ-054 controls; P8c does not accept single-vector, block-Wiedemann, trace-only, or unchecked annihilator coverage.
