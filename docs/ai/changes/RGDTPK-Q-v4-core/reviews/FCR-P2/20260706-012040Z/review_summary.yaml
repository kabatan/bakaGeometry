phase_specific_checks:
- check_id: fcr-p2-public-kernel-module-quarantine
  required_by: FCR-P2
  verdict: pass
  evidence: action_krylov, norm_trace_projection, regular_chain_projection, sparse_resultant, specialization_interpolation, target_relation_search, and universal_elimination are #[cfg(test)] in kernels/mod.rs.
  reviewer_rationale: The prior blocker is fixed; high-risk partial kernels are no longer public production modules.
- check_id: fcr-p2-production-registry-base-only
  required_by: FCR-P2
  verdict: pass
  evidence: production all_kernels exposes only TargetUnivariateKernel and LinearAffineKernel; kernel_by_kind is #[cfg(test)].
  reviewer_rationale: Production dispatch cannot select quarantined advanced kernels through the kernel registry.
- check_id: fcr-p2-planner-admission-quarantine
  required_by: FCR-P2
  verdict: pass
  evidence: all_planner_kernel_kinds returns only base kernels under cfg(not(test)), and advanced kinds decline under production admission.
  reviewer_rationale: Planner-level reachability no longer admits partial advanced kernels as production success paths.
- check_id: fcr-p2-synthetic-and-helper-only-paths-quarantined
  required_by: FCR-010/FCR-012/FCR-P2
  verdict: pass
  evidence: verify::replay and synthetic_for_tests are #[cfg(test)]; compose::separator_elimination and the compose fallback are #[cfg(test)].
  reviewer_rationale: Synthetic replay and helper-only support construction are not reachable from production final claims in FCR-P2.
- check_id: fcr-p2-production-safe-schedule-split
  required_by: FCR-P2
  verdict: pass
  evidence: relation schedule metadata was moved to geosolver-core/src/planner/relation_schedule.rs so planner types do not depend on the test-only target_relation_search module.
  reviewer_rationale: The quarantine preserves production metadata needed by plans without exposing the partial kernel implementation.
