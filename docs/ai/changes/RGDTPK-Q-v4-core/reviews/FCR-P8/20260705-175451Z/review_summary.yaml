phase_specific_checks:
- check_id: fcr-p8-replay-production-exported
  required_by: FCR-P8
  verdict: pass
  evidence: verify/mod.rs exposes pub mod replay and pub use replay without cfg(test).
  reviewer_rationale: replay_run_certificate is production-exported, not only a test
    helper.
- check_id: fcr-p8-actual-dag-replay-main-path
  required_by: FCR-P8
  verdict: pass
  evidence: replay_run_certificate reconstructs the actual TargetProjectionDAG from
    the compressed system, compares cert.target_projection_dag_hash to actual_dag.dag_hash,
    derives dependencies from actual child edges, and calls verify_projection_messages_with_actual_blocks
    over actual_dag.blocks.
  reviewer_rationale: The accepted replay path no longer constructs a synthetic all-relations
    block.
- check_id: fcr-p8-core-certificate-binds-dag-evidence
  required_by: FCR-P8
  verdict: pass
  evidence: FinalDagReplayEvidence records DAG hash, message/block IDs, source hashes,
    child dependencies, block authorization hashes, block relation ids/hashes, child
    edges, edge authorization hashes, support certificate hash, root isolation hash,
    and decoded candidate hash; replay recomputes and requires full evidence equality.
  reviewer_rationale: CoreRunCertificate binds actual DAG/block authorization evidence
    through both evidence hash and stored evidence.
- check_id: fcr-p8-public-pipeline-replay
  required_by: FCR-P8
  verdict: pass
  evidence: p3_public_pipeline_integration asserts final_dag_replay_evidence is present
    and replay_run_certificate accepts the public pipeline result against the original
    problem.
  reviewer_rationale: Actual replay is exercised on the public candidate-cover path.
- check_id: fcr-p8-required-tamper-coverage
  required_by: FCR-P8
  verdict: pass
  evidence: Tests cover relation outside actual block, child not on DAG edge, plan/package/support/root/candidate
    tamper, candidate omission/duplication, duplicate message rejection, and block
    relation authorization evidence tamper.
  reviewer_rationale: Mandatory tamper cases are represented and fresh after the last
    code change.
appendix_override_checks:
- appendix_section: Appendix A MECH-010 replay and certificate binding
  controlling_requirement: FCR-P8
  verdict: pass
  evidence: Replay is actual-DAG based and certificate evidence binds source, plan,
