  reviewer_rationale: Fake/test F4 is not production compiled or called from Universal
    execution.
- check_id: fcr-p6-universal-uses-certified-local-groebner
  required_by: FCR-P6
  verdict: pass
  evidence: universal_elimination.rs executes EliminationStrategy::LocalGroebner and
    elimination.rs validates keep-only generators and certificates.
  reviewer_rationale: Universal uses certified local Groebner rather than a fake F4
    route.
- check_id: fcr-p6-output-memberships-match-output-relations
  required_by: FCR-P6
  verdict: pass
  evidence: Universal local Groebner output no longer primitive-normalizes relation_generators
    apart from certificates; verify_message.rs replays output_memberships against
    message outputs.
  reviewer_rationale: The previous risk of certifying one polynomial while outputting
    a primitive-scaled different polynomial is closed for this path.
- check_id: fcr-p6-keep-only-no-coordinate-roots
  required_by: FCR-P6
  verdict: pass
  evidence: extract_verified_export_generators rejects non-export variables, required
    FCR-P6 tests assert keep-only output and no Universal local coordinate/root/RUR
    payload.
  reviewer_rationale: Local elimination exports target/separator variables only and
    does not produce coordinate roots/RUR.
- check_id: fcr-p6-required-tests
  required_by: FCR-P6
  verdict: pass
  evidence: cargo test --lib fcr_ passed all four required FCR-P6 tests plus existing
    FCR tests.
  reviewer_rationale: Required dynamic coverage exists and is fresh after the last
    code change.
