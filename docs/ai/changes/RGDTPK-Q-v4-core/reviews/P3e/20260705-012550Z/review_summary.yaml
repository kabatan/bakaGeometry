phase_specific_checks:
  - check_id: "p3e-quotient-handle-no-coordinate-export"
    required_by: "Appendix A section 10.14 and RGQ-021"
    verdict: "pass"
    evidence: "TargetQuotientHandle exposes normal-form and variable-action APIs, with no coordinate roots or full coordinate RUR export API; handle construction rejects coordinate-exporting handles."
    reviewer_rationale: "The primitive boundary stays target-relevant and does not expose coordinate solutions."
  - check_id: "p3e-target-action-matrix-verification"
    required_by: "RGQ-044 and RGQ-054"
    verdict: "pass"
    evidence: "Target action matrix columns are materialized through multiply_by_variable and checked against exact normal_form(T * basis_j)."
    reviewer_rationale: "Coverage is based on exact quotient action verification rather than a trace-only or heuristic sequence."
  - check_id: "p3e-characteristic-support-coverage-only"
    required_by: "RGQ-044 and RGQ-054"
    verdict: "pass"
    evidence: "certify_krylov_coverage and verify_annihilator accept only VerifiedCharacteristicSupportCoverage equal to the exact characteristic polynomial."
    reviewer_rationale: "Single-vector Krylov, block Wiedemann, trace powers, or unverified S(M_T)=0 cannot produce an accepted relation."
  - check_id: "p3e-undercoverage-regression"
    required_by: "PLAN.md P3e"
    verdict: "pass"
    evidence: "The regression where a single-vector Krylov sequence recovers T - 1 while the characteristic polynomial is T^2 - 3T + 2 is rejected with CertificateDesignGap."
    reviewer_rationale: "The weak recurrence path remains candidate-only evidence and cannot close coverage."
appendix_override_checks:
