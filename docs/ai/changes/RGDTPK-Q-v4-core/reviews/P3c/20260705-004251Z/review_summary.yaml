phase_specific_checks:
- check_id: p3c-local-bounded-groebner
  required_by: Appendix A section 10.9 and RGQ-056
  verdict: pass
  evidence: groebner_elimination_basis is bounded by pair/basis caps and reviewer
    found no global coordinate solver path.
  reviewer_rationale: P3c remains a local support primitive.
- check_id: p3c-groebner-certificate-propagation
  required_by: RGQ-010 and Appendix A section 10.9
  verdict: pass
  evidence: New Groebner remainders are checked with verify_membership_by_certificate
    and tests cover local Groebner keep-variable certificate export.
  reviewer_rationale: Generated basis entries are not decorative certificates.
- check_id: p3c-keep-variable-export
  required_by: Appendix A section 10.11
  verdict: pass
  evidence: Certified extraction filters with polynomial_in_keep_variables; validate_local_elimination_result
    rejects non-keep exports.
  reviewer_rationale: Exported generators are restricted to Q[keep].
- check_id: p3c-local-f4
  required_by: Appendix A section 10.10
  verdict: pass
  evidence: f4_reduce_batch performs exact reductions and records trace dimensions;
    f4_elimination_local returns LocalF4 output validated by exact certificates.
  reviewer_rationale: The F4 path is covered and remains local.
- check_id: p3c-dispatcher-validation
  required_by: Appendix A section 10.11
  verdict: pass
  evidence: eliminate_to_keep_variables checks disjoint eliminate/keep sets and validates
    keep variables and certificates after LocalGroebner or LocalF4 dispatch.
  reviewer_rationale: Dispatcher boundaries are enforced.
- check_id: p3c-forbidden-coordinate-global-nonfinite
  required_by: RGQ-005, RGQ-022, and RGQ-056
  verdict: pass
  evidence: Static scans found no coordinate root, coordinate RUR, solve-all-coordinates,
    global CAS/QE/CAD/homotopy, or P3c nonfinite certification path.
  reviewer_rationale: P3c does not become a hidden heavy fallback.
appendix_override_checks:
- appendix_section: Appendix A sections 10.9 through 10.11 and RGQ-056
  controlling_requirement: RGQ-056
  verdict: pass
  evidence: Reviewer confirmed local F4/Groebner outputs use exported-variable verification
    and do not output coordinate roots, coordinate parametrization, full coordinate
    RUR, or global coordinate lex basis.
  reviewer_rationale: The hardening override is respected for this local-start phase.
status_mapping_checks:
- error_or_internal_condition: P3c invalid disjoint sets and internal invariant failures
  mapped_solver_status: InvalidInput or ImplementationBug
  verdict: pass
  evidence: Tests assert overlapping keep/eliminate returns InvalidInput and non-keep
    export validation returns ImplementationBug.
  reviewer_rationale: No forbidden NotYetImplemented/Unsupported local status is introduced.
suite_partition_checks:
