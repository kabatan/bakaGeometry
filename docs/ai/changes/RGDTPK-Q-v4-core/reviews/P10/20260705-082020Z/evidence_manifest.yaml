static_scans:
- scan_id: p10-forbidden-shortcuts
  command: rg geometry names, fixture/expected-answer strings, coordinate-root/full-coordinate/RUR paths, QE/CAD, Unsupported/NotYetImplemented, local Universal nonfinite wording, and relation-search-failure-to-nonfinite wording
  forbidden_pattern: geometry dispatch, fixture/expected-answer dispatch, coordinate-root/full-coordinate/RUR solve paths, QE/CAD, ordinary unsupported, local Universal nonfinite, or relation-search failure mapped to nonfinite
  result: pass
  output_path: docs/ai/changes/RGDTPK-Q-v4-core/evidence/P10/static_scans.txt
- scan_id: p10-certified-nonfinite-locations
  command: rg CertifiedNonFiniteTargetImage in compose, status, Universal, and TargetRelationSearch files
  forbidden_pattern: CertifiedNonFiniteTargetImage emitted by local TargetRelationSearch or Universal failure instead of final-support positive certificate
  result: pass
  output_path: docs/ai/changes/RGDTPK-Q-v4-core/evidence/P10/static_scans.txt
- scan_id: p10-hardcase-polarity
  command: rg AlgorithmicHardCase, FiniteResourceFailure, CertificateDesignGap, NoLocalCertifiedNonFinite, no target-only, non-finiteness not certified, and no target/separator relation found anchors
  forbidden_pattern: no-support, relation-search exhaustion, or local Universal failure routed to nonfinite
  result: pass
  output_path: docs/ai/changes/RGDTPK-Q-v4-core/evidence/P10/static_scans.txt
- scan_id: p10-implementation-anchors
  command: rg ComposedProjection, compose_projection_messages, separator elimination, final support, nonfinite certificate functions, and p10 tests
  forbidden_pattern: missing P10 required function or focused test anchor
  result: pass
  output_path: docs/ai/changes/RGDTPK-Q-v4-core/evidence/P10/static_scans.txt
