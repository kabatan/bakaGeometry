known_limitations:
- P10 closes MECH-009 and MECH-015 only; it does not close P11 replay/certificate closure, P12 roots/decode, public orchestration, performance readiness, final acceptance, or source-faithful/acceptance-complete claims.
- "The nonfinite certificate route is intentionally narrow: target-free composed generators plus exact rational consistency witness. Cases outside that route remain hard/certificate-gap cases rather than broad nonfinite completeness."
- No R-ID is marked VERIFIED by the P10 review.
