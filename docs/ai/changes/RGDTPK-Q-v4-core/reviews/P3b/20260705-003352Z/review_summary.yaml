phase_specific_checks:
- check_id: p3b-prime-screening
  required_by: Appendix A sections 10.3 and 10.7
  verdict: pass
  evidence: Reviewer confirmed selected solve primes are screened against matrix coefficients
    and inhomogeneous RHS coefficients.
  reviewer_rationale: Prime selection no longer admits denominators or relevant coefficients
    that would invalidate modular reduction.
- check_id: p3b-exact-modular-arithmetic
  required_by: Appendix A sections 10.3 through 10.6
  verdict: pass
  evidence: Reviewer confirmed modular reduction, CRT, rational reconstruction, sparse/dense
    rank, and nullspace use exact integer/Fp arithmetic.
  reviewer_rationale: P3b contains no floating exact path.
- check_id: p3b-rank-profile-stability
  required_by: Appendix A section 10.7
  verdict: pass
  evidence: PrimeSolveTrace includes pivot_columns, loops compare pivot profiles,
    and tests cover same-rank/different-pivot behavior.
  reviewer_rationale: The solve layer stabilizes on pivot-column profile rather than
    rank alone.
- check_id: p3b-stable-suffix-reconstruction
  required_by: Appendix A section 10.7
  verdict: pass
  evidence: basis_samples and solution_samples are cleared on profile changes; tests
    cover inhomogeneous stable-suffix reconstruction.
  reviewer_rationale: CRT/reconstruction uses only the final stable rank-profile suffix.
- check_id: p3b-no-reconstruction-before-configured-stability
  required_by: Appendix A section 10.7
  verdict: pass
  evidence: solve_homogeneous_modular and solve_inhomogeneous_modular gate reconstruction
    on stability_achieved; tests assert no candidate when max_primes is exhausted
    before stability.
  reviewer_rationale: The fourth-review blocker is closed.
- check_id: p3b-candidate-only-proof-boundary
  required_by: RGQ-019 and RGQ-020
  verdict: pass
  evidence: Modular solve outputs use CandidateOnlyRequiresExactQCheck and do not
    certify Q relations.
  reviewer_rationale: P3b does not overclaim relation proof.
appendix_override_checks:
- appendix_section: Appendix A sections 10.3 through 10.7
