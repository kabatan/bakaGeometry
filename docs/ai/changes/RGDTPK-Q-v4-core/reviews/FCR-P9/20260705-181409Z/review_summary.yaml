phase_specific_checks:
- check_id: fcr-p9-message-ideal-separator-composition
  required_by: FCR-P9
  verdict: pass
  evidence: compose_projection_messages collects projection message relation generators
    and invokes eliminate_separators_from_message_relations only when target-only
    roots are absent.
  reviewer_rationale: Composition uses the composed message ideal rather than reconstructing
    the original coordinate system.
- check_id: fcr-p9-global-support-replays-separator-proof
  required_by: FCR-P9
  verdict: pass
  evidence: verify_global_support calls verify_separator_evidence, which checks separator
    package hashes, replays verify_projection_message on a reconstructed message-only
    separator context, and requires separator outputs in root_relations.
  reviewer_rationale: Separator-derived supports are not accepted by multiplication
    alone; the separator membership proof must replay.
- check_id: fcr-p9-actual-dag-support-replay
  required_by: FCR-P9
  verdict: pass
  evidence: verify/replay.rs recomposes support with compose_projection_messages over
    the actual TargetProjectionDAG and projection messages; the obsolete replay_composed_projection
    helper is removed.
  reviewer_rationale: Certificate replay checks support through the same actual DAG
    composition route.
- check_id: fcr-p9-public-root-decode-success-path
  required_by: FCR-P9
  verdict: pass
  evidence: orchestrator runs verify_global_support then step_roots; step_roots runs
    squarefree_support, isolate_real_roots, and decode_candidates before CertifiedCandidateCover
    construction.
  reviewer_rationale: Public success does not skip root isolation or candidate decode.
- check_id: fcr-p9-empty-real-root-cover
  required_by: FCR-P9
  verdict: pass
  evidence: p3_public_pipeline_integration covers T^2+1 and asserts CertifiedCandidateCover,
    support, squarefree support, empty roots/candidates, certificate, diagnostic,
    and accepted replay.
  reviewer_rationale: A support with no real roots remains a certified empty candidate
    cover rather than a hard-case.
- check_id: fcr-p9-target-relation-helper-not-completion-registry
  required_by: FCR-P9
  verdict: pass
  evidence: target_relation_search is production-compiled for separator helper use,
    while production all_kernels and non-test all_planner_kernel_kinds retain only
    TargetUnivariate and LinearAffine.
  reviewer_rationale: The P7 production completion registry quarantine remains intact.
appendix_override_checks:
- appendix_section: Appendix A MECH-009 composition and final support
  controlling_requirement: FCR-P9
  verdict: pass
  evidence: Separator elimination uses only message relations, records separator evidence,
    and verify_global_support replays it.
  reviewer_rationale: The phase respects MECH-009 without claiming final candidate-cover
    readiness.
- appendix_section: Appendix A MECH-011 exact root isolation and decode
  controlling_requirement: FCR-P9
  verdict: pass
  evidence: Public candidate-cover construction runs squarefree_support, exact isolation,
    and decode_candidates, with integration coverage for empty and non-empty roots.
  reviewer_rationale: Root/candidate outputs are concrete and hash-bound, not placeholders.
status_mapping_checks:
- error_or_internal_condition: support polynomial has no real roots
  mapped_solver_status: CertifiedCandidateCover
  verdict: pass
  evidence: fcr_p9_public_api_returns_empty_candidate_cover_for_support_with_no_real_roots
    asserts CertifiedCandidateCover with empty roots and candidates.
  reviewer_rationale: No-real-root support is not converted to AlgorithmicHardCase.
- error_or_internal_condition: separator proof tamper
  mapped_solver_status: ImplementationBug or verification rejection
  verdict: pass
  evidence: fcr_p9_support_verifier_replays_separator_elimination_certificate tampers
    a separator membership multiplier and verify_global_support rejects it.
  reviewer_rationale: Exact proof failure does not silently pass.
