phase_specific_checks:
- check_id: p12-squarefree-support
  required_by: RGQ-028
  verdict: pass
  evidence: squarefree_support rejects zero support and delegates exact squarefree normalization to derivative/gcd-backed univariate arithmetic.
  reviewer_rationale: P12 implements exact squarefree support without floating factorization or placeholder roots.
- check_id: p12-exact-real-root-isolation
  required_by: RGQ-028
  verdict: pass
  evidence: isolate_real_roots uses exact squarefree support and exact Sturm-backed isolation with rational intervals; tests cover no-real, rational, multiple, irrational, repeated, and high-coefficient cases.
  reviewer_rationale: Required exact rational isolating intervals are present and tested.
- check_id: p12-decoded-candidate-binding
  required_by: RGQ-028
  verdict: pass
  evidence: decode_candidates binds target, support hash, root index, isolating interval, and candidate hash.
  reviewer_rationale: Candidate objects are deterministic and not placeholders.
- check_id: p12-algebraic-root-records
  required_by: RGQ-034
  verdict: pass
  evidence: AlgebraicRootRecord, algebraic_roots_from_support, exact refinement, and comparison helpers are implemented and covered by focused tests.
  reviewer_rationale: Mandatory algebraic-number implementation is present rather than deferred.
- check_id: p12-production-candidate-cover-finalizer
  required_by: RGQ-037
  verdict: pass
  evidence: finalize_candidate_cover_result computes squarefree support, exact roots, and decoded candidates before returning CertifiedCandidateCover.
  reviewer_rationale: Prior unit-test-only decode wiring gap is remediated through a production support-producing result construction path.
- check_id: p12-replay-candidate-completeness
  required_by: RGQ-048
  verdict: pass
  evidence: verify_roots_and_candidates rejects omitted or duplicate decoded candidates and recomputes target/support/index/interval/hash binding.
  reviewer_rationale: Self-consistently rehashed omission/duplicate tampering is rejected.
- check_id: p12-support-producing-integration
  required_by: RGQ-037
  verdict: pass
  evidence: p12_candidate_cover_finalizer_returns_exact_roots_and_nonplaceholder_candidates exercises nonzero support through the finalizer and observes exact roots and non-placeholder candidates.
  reviewer_rationale: P12 has integration evidence for support-producing candidate-cover construction within its scope.
