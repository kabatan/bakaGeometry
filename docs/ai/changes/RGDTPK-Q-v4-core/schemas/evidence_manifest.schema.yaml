$schema: "https://json-schema.org/draft/2020-12/schema"
$title: "RGDTPK-Q-v4 evidence_manifest.yaml schema v2.2"
type: object
additionalProperties: false
required:
  - schema_version
  - phase_id
  - commit
  - algorithm_spec_source_sha256
  - failure_source_sha256
  - base_spec_sha256
  - plan_sha256
  - source_map_sha256
  - review_archive_schema_sha256
  - review_summary_schema_sha256
  - evidence_manifest_schema_sha256
  - evidence_files
  - command_outputs
  - static_scans
  - function_implementation_table
  - related_reviews
  - known_limitations
  - algorithmic_claims_made
  - claim_ceiling_after_phase
  - commands_are_fresh
  - no_untracked_evidence_omitted
properties:
  schema_version: {const: "rgdtpk-evidence-manifest-v2.2"}
  phase_id:
    type: string
    pattern: "^P(0|1|2|3a|3b|3c|3d|3e|3f|4|5|6|7|8a|8b|8c|8d|9|10|11|12|13|14|15|16)$"
  commit: {type: string, minLength: 1}
  algorithm_spec_source_sha256: {$ref: "#/$defs/sha256"}
  failure_source_sha256: {$ref: "#/$defs/sha256"}
  base_spec_sha256: {$ref: "#/$defs/sha256"}
  plan_sha256: {$ref: "#/$defs/sha256"}
  source_map_sha256: {$ref: "#/$defs/sha256"}
  review_archive_schema_sha256: {$ref: "#/$defs/sha256"}
  review_summary_schema_sha256: {$ref: "#/$defs/sha256"}
  evidence_manifest_schema_sha256: {$ref: "#/$defs/sha256"}
  evidence_files:
    type: array
    minItems: 1
    items: {$ref: "#/$defs/evidence_file"}
  command_outputs:
    type: array
    minItems: 1
    items: {$ref: "#/$defs/command_output"}
  static_scans:
    type: array
    items: {$ref: "#/$defs/static_scan"}
  function_implementation_table:
    type: string
    minLength: 1
  related_reviews:
    type: array
    items: {type: string, minLength: 1}
  known_limitations:
    type: array
    items: {type: string}
  algorithmic_claims_made:
    type: array
    items: {$ref: "#/$defs/claim_label"}
  claim_ceiling_after_phase: {$ref: "#/$defs/claim_label"}
  commands_are_fresh: {type: boolean}
  no_untracked_evidence_omitted: {type: boolean}
$defs:
  sha256:
    type: string
    pattern: "^[0-9a-f]{64}$"
  claim_label:
    type: string
    pattern: "^(SCAFFOLD_READY|PARTIAL_MECHANISM_READY:MECH-[0-9]{3}|CANDIDATE_COVER_CORE_READY|EXACT_IMAGE_CORE_READY|RGDTPK_Q_V4_ACCEPTANCE_COMPLETE|SOURCE_FAITHFUL_TO_SUPPLIED_V4_SPEC)$"
  evidence_file:
    type: object
    additionalProperties: false
    required: [path, sha256, purpose]
    properties:
      path: {type: string, minLength: 1}
      sha256: {$ref: "#/$defs/sha256"}
      purpose: {type: string, minLength: 1}
  command_output:
    type: object
    additionalProperties: false
    required: [command, cwd, exit_code, output_path, output_sha256, finished_at_utc]
    properties:
      command: {type: string, minLength: 1}
      cwd: {type: string, minLength: 1}
      exit_code: {type: integer}
      output_path: {type: string, minLength: 1}
      output_sha256: {$ref: "#/$defs/sha256"}
      finished_at_utc:
        type: string
        pattern: "^[0-9]{8}-[0-9]{6}Z$"
  static_scan:
    type: object
    additionalProperties: false
    required: [scan_id, command, forbidden_pattern, result, output_path]
    properties:
      scan_id: {type: string, minLength: 1}
      command: {type: string, minLength: 1}
      forbidden_pattern: {type: string, minLength: 1}
      result: {enum: [pass, fail]}
      output_path: {type: string, minLength: 1}
allOf:
  - if:
      properties:
        phase_id:
          not: {const: P0}
      required: [phase_id]
    then:
      properties:
        function_implementation_table: {minLength: 1}
        commands_are_fresh: {const: true}
        no_untracked_evidence_omitted: {const: true}
