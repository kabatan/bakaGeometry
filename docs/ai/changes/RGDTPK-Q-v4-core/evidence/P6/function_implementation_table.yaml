phase_id: "P6"
claim_ceiling_after_phase: "PARTIAL_MECHANISM_READY:MECH-005"
owned_files:
  - "geosolver-core/src/planner/cost_model.rs"
  - "geosolver-core/src/planner/probes.rs"
  - "geosolver-core/src/planner/admission.rs"
  - "geosolver-core/src/planner/kernel_plan.rs"
  - "geosolver-core/src/planner/ladder.rs"
  - "geosolver-core/src/planner/planner.rs"
  - "geosolver-core/src/kernels/target_relation_search.rs"
  - "geosolver-core/src/solver/options.rs"
functions:
  - name: "plan_all_blocks"
    file: "geosolver-core/src/planner/planner.rs"
    required_by: "Appendix A section 13.6; PLAN.md P6; RGQ-015"
    implementation_status: "implemented"
    evidence:
      - "Validates the TargetProjectionDAG, runs probes, collects admissions, estimates costs, builds a declared ladder, and returns a hash-bound KernelPlan for every block."
      - "Test `p6_planning_is_deterministic_and_declares_universal_last` checks repeated-run plan equality and Universal final position."
  - name: "collect_kernel_admissions"
    file: "geosolver-core/src/planner/admission.rs"
    required_by: "Appendix A section 13.3; PLAN.md P6; RGQ-015; RGQ-039"
    implementation_status: "implemented"
    evidence:
      - "Considers all nine Appendix A kernel kinds through `all_planner_kernel_kinds`."
      - "Admitted kernels carry concrete KernelExecutionPlan data; later-phase kernels are declined instead of overclaiming narrow primitives."
  - name: "all_planner_kernel_kinds"
    file: "geosolver-core/src/planner/admission.rs"
    required_by: "PLAN.md P6 task 2; Appendix A section 14.2"
    implementation_status: "implemented"
    evidence:
      - "Returns TargetUnivariate, LinearAffine, TargetRelationSearch, SparseResultantProjection, TargetActionKrylov, NormTraceProjection, RegularChainProjection, SpecializationInterpolation, and UniversalTargetElimination."
  - name: "estimate_kernel_cost"
    file: "geosolver-core/src/planner/cost_model.rs"
    required_by: "Appendix A section 13.1; PLAN.md P6"
    implementation_status: "implemented"
    evidence:
      - "Builds deterministic cost estimates from probe matrix size, quotient-rank estimate, coefficient-height estimate, certificate cost, and kernel tie-break order."
  - name: "compare_cost"
    file: "geosolver-core/src/planner/cost_model.rs"
    required_by: "Appendix A section 13.1"
    implementation_status: "implemented"
    evidence:
      - "Orders by deterministic score, kernel order, and estimate hash."
  - name: "run_cost_probes"
    file: "geosolver-core/src/planner/probes.rs"
    required_by: "Appendix A section 13.2; PLAN.md P6; RGQ-062"
    implementation_status: "implemented"
    evidence:
      - "Collects structural metrics, deterministic rank estimates, Macaulay/template size, sparse support hint, coefficient-growth estimate, and a probe hash."
      - "Probe results are used only by cost estimates and plan evidence, not as correctness proof."
  - name: "modular_rank_probe"
    file: "geosolver-core/src/planner/probes.rs"
    required_by: "Appendix A section 13.2"
    implementation_status: "implemented"
    evidence:
      - "Uses deterministic prime list and graph metric rank estimate to produce a hash-bound planning probe."
  - name: "local_macaulay_size_probe"
    file: "geosolver-core/src/planner/probes.rs"
    required_by: "Appendix A section 13.2"
    implementation_status: "implemented"
    evidence:
      - "Records deterministic template row/column estimates for planning."
  - name: "mixed_support_probe"
    file: "geosolver-core/src/planner/probes.rs"
    required_by: "Appendix A section 13.2"
    implementation_status: "implemented"
    evidence:
      - "Records a sparse-support planning hint only; not used as proof or replacement for RGQ-042."
  - name: "build_declared_ladder"
    file: "geosolver-core/src/planner/ladder.rs"
    required_by: "Appendix A section 13.5; PLAN.md P6; RGQ-015"
    implementation_status: "implemented"
    evidence:
      - "Includes admitted plans only, orders by deterministic cost, and moves UniversalTargetElimination to the final generic target-direct position."
  - name: "KernelPlan::new"
    file: "geosolver-core/src/planner/kernel_plan.rs"
    required_by: "Appendix A section 13.4; PLAN.md P6; RGQ-038"
    implementation_status: "implemented"
    evidence:
      - "Binds block id, declared ladder plan hashes, admission hashes, and cost-estimate hashes into `plan_hash`."
  - name: "KernelExecutionPlan::new"
    file: "geosolver-core/src/planner/kernel_plan.rs"
    required_by: "RGQ-039; RGQ-041; PLAN.md P6 task 4"
    implementation_status: "implemented"
    evidence:
      - "Stores block authorization hash, source relation ids/hashes, child block ids, child message hash slots, exported variables, eliminated variables, support plan, resource bounds, certificate route, failure behavior, and plan hash."
  - name: "require_declared_kernel_plan"
    file: "geosolver-core/src/planner/kernel_plan.rs"
    required_by: "PLAN.md P6 task 10; RGQ-038; RGQ-053"
    implementation_status: "implemented"
    evidence:
      - "Rejects hash mismatch before execution and rejects a runtime kernel choice absent from the declared ladder."
      - "Top-level plan hash recomputes nested KernelExecutionPlan content instead of trusting stored child hashes."
      - "Test `p6_hidden_fallback_is_rejected_when_kernel_absent_from_declared_ladder` deletes TargetRelationSearch from a plan and verifies failure."
      - "Test `p6_declared_ladder_rejects_execution_plan_field_tampering` mutates exported variables, support bounds, resource bounds, and failure behavior without updating stored hashes and verifies failure."
  - name: "relation_search_default_export_degree_cap"
    file: "geosolver-core/src/kernels/target_relation_search.rs"
    required_by: "RGQ-042; PLAN.md P6 task 6"
    implementation_status: "implemented"
    evidence:
      - "Computes `max(z_seed, 2*d_max + |Y| + |Z|)` from local relations, eliminated variables, and exported variables."
  - name: "build_dense_relation_search_schedule"
    file: "geosolver-core/src/kernels/target_relation_search.rs"
    required_by: "RGQ-042; RGQ-055; PLAN.md P6 task 6"
    implementation_status: "implemented"
    evidence:
      - "Builds deterministic stages from z_seed through e_cap, including export support hashes, multiplier support hashes, row monomial hashes, matrix dimensions, and schedule hash."
      - "Test `rgq042_dense_schedule_is_recomputable_from_j_y_z_and_options` recomputes the schedule and checks stage order."
      - "Test `rgq042_option_cap_is_not_silently_widened` verifies explicit option caps follow RGQ-042 exactly instead of being widened to z_seed."
      - "Test `rgq055_schedule_reproducibility_covers_three_local_shapes` independently recomputes support hashes, row hashes, matrix dimensions, and stage order for three different local ideal shapes."
  - name: "build_export_monomial_support"
    file: "geosolver-core/src/kernels/target_relation_search.rs"
    required_by: "RGQ-042"
    implementation_status: "implemented"
    evidence:
      - "Enumerates all exported-variable monomials of total degree <= export degree in deterministic canonical order."
  - name: "build_multiplier_supports"
    file: "geosolver-core/src/kernels/target_relation_search.rs"
    required_by: "RGQ-042"
    implementation_status: "implemented"
    evidence:
      - "Enumerates multiplier monomial supports over Y union Z using the RGQ-042 stage bound `L_e - d_i`."
  - name: "SolverOptions.max_relation_search_export_degree"
    file: "geosolver-core/src/solver/options.rs"
    required_by: "RGQ-042 options-bound e_cap"
    implementation_status: "implemented"
    evidence:
      - "Adds optional schedule cap used by `build_dense_relation_search_schedule`; default remains unbounded by user override and uses RGQ-042 default cap."
tests:
  focused:
    - "planner::planner::tests::p6_planning_is_deterministic_and_declares_universal_last"
    - "planner::planner::tests::p6_hidden_fallback_is_rejected_when_kernel_absent_from_declared_ladder"
    - "planner::planner::tests::p6_declared_ladder_rejects_execution_plan_field_tampering"
    - "kernels::target_relation_search::tests::rgq042_dense_schedule_is_recomputable_from_j_y_z_and_options"
    - "kernels::target_relation_search::tests::rgq042_option_cap_is_not_silently_widened"
    - "kernels::target_relation_search::tests::rgq055_schedule_reproducibility_covers_three_local_shapes"
  full_crate: "112 passed"
tamper_challenges:
  - "Declared ladder deletion of TargetRelationSearch is rejected by `require_declared_kernel_plan`."
  - "Execution-plan field mutation is rejected even when stored child hashes are not updated."
known_boundaries:
  - "P6 does not execute kernels or create projection messages."
  - "P6 starts but does not close MECH-013."
  - "P7/P8/P9 kernels remain declined until their owning phases implement generic support-producing plans."
