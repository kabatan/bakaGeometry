phase_id: "P3b"
claim_ceiling_after_phase: "SCAFFOLD_READY"
implemented_files:
  - path: "geosolver-core/src/algebra/modular.rs"
    functions:
      - name: "choose_prime_avoiding_denominators"
        status: "implemented"
        evidence: "Uses deterministic prime iteration from seed and skips primes dividing coefficient denominators or nonzero coefficient numerators."
      - name: "reduce_q_to_fp"
        status: "implemented"
        evidence: "Reduces rational coefficients modulo a chosen prime using exact modular inverse of denominators."
      - name: "lift_fp_coeff"
        status: "implemented"
        evidence: "Returns centered integer representative in Q-independent integer arithmetic."
  - path: "geosolver-core/src/algebra/crt.rs"
    functions:
      - name: "crt_combine"
        status: "implemented"
        evidence: "Combines compatible congruences with exact integer extended-gcd inverse."
      - name: "crt_vector_combine"
        status: "implemented"
        evidence: "Combines vectors entrywise and records lcm modulus."
      - name: "try_crt_combine"
        status: "implemented"
        evidence: "Checked helper returns None for incompatible congruences."
  - path: "geosolver-core/src/algebra/rational_reconstruction.rs"
    functions:
      - name: "reconstruct_rational"
        status: "implemented"
        evidence: "Searches exact bounded numerator/denominator lifts and returns None if reconstruction is nonunique."
      - name: "reconstruct_polynomial"
        status: "implemented"
        evidence: "Reconstructs each modular coefficient as a rational and normalizes the sparse polynomial."
  - path: "geosolver-core/src/algebra/sparse_matrix.rs"
    functions:
      - name: "build_sparse_matrix_fp"
        status: "implemented"
        evidence: "Builds normalized sparse finite-field matrix rows while preserving declared row count."
      - name: "row_echelon_sparse_fp"
        status: "implemented"
        evidence: "Computes exact RREF over Fp with pivot columns and rank trace."
      - name: "nullspace_sparse_fp"
        status: "implemented"
        evidence: "Builds an exact nullspace basis from RREF free variables."
      - name: "rank_sparse_fp"
        status: "implemented"
        evidence: "Returns exact finite-field rank from RREF."
  - path: "geosolver-core/src/algebra/dense_matrix.rs"
    functions:
      - name: "build_dense_matrix_fp"
        status: "implemented"
        evidence: "Builds dense row-major finite-field matrix."
      - name: "row_echelon_dense_fp"
        status: "implemented"
        evidence: "Computes exact dense RREF over Fp."
      - name: "nullspace_dense_fp"
        status: "implemented"
        evidence: "Computes dense nullspace via the shared finite-field sparse RREF path."
      - name: "rank_dense_fp"
        status: "implemented"
        evidence: "Returns exact dense finite-field rank."
  - path: "geosolver-core/src/algebra/linear_solve.rs"
    functions:
      - name: "solve_homogeneous_modular"
        status: "implemented"
        evidence: "Runs deterministic fully-screened prime sequence, records rank/nullity/pivot-column rank-profile traces, waits for the configured stable rank profile threshold, resets sample buffers on profile changes, CRT-combines and rationally reconstructs nullspace candidates only from the stable-profile suffix after stability is actually achieved, and marks them CandidateOnlyRequiresExactQCheck."
      - name: "solve_inhomogeneous_modular"
        status: "implemented"
        evidence: "Screens primes against matrix and RHS coefficients, solves modular inhomogeneous systems, records rank profile, waits for the configured stable rank profile threshold, resets sample buffers on profile changes, CRT-combines and rationally reconstructs solution candidates only from the stable-profile suffix after stability is actually achieved, and marks them CandidateOnlyRequiresExactQCheck."
tests:
  - "algebra::modular::tests::prime_choice_is_deterministic_and_avoids_denominators_and_coefficients"
  - "algebra::modular::tests::rational_coefficients_reduce_and_lift_exactly"
  - "algebra::crt::tests::crt_round_trip_combines_coprime_moduli"
  - "algebra::crt::tests::incompatible_crt_returns_none_in_checked_api"
  - "algebra::rational_reconstruction::tests::rational_reconstruction_round_trip_is_exact"
  - "algebra::rational_reconstruction::tests::unstable_reconstruction_fails_when_multiple_small_lifts_exist"
  - "algebra::rational_reconstruction::tests::polynomial_reconstruction_normalizes_terms"
  - "algebra::sparse_matrix::tests::sparse_rank_and_nullspace_are_exact_mod_prime"
  - "algebra::dense_matrix::tests::dense_rank_matches_sparse_algorithm"
  - "algebra::linear_solve::tests::homogeneous_modular_solve_exposes_candidate_trace_only"
  - "algebra::linear_solve::tests::inhomogeneous_modular_solve_returns_candidate_solution_not_proof"
  - "algebra::linear_solve::tests::every_prime_in_solve_sequence_avoids_matrix_denominators_and_coefficients"
  - "algebra::linear_solve::tests::inhomogeneous_prime_sequence_avoids_rhs_denominators"
  - "algebra::linear_solve::tests::modular_solve_waits_for_stable_rank_profile_not_rank_only"
  - "algebra::linear_solve::tests::inhomogeneous_reconstruction_uses_only_stable_rank_profile_suffix"
  - "algebra::linear_solve::tests::homogeneous_does_not_reconstruct_without_stability"
  - "algebra::linear_solve::tests::inhomogeneous_does_not_reconstruct_without_stability"
not_implemented_in_this_phase:
  - "P8a membership matrix construction and exact Q relation verification."
  - "P3c local Groebner/F4 elimination APIs."
  - "Any acceptance of a modular relation as proof; P3b returns only rationally reconstructed candidates for caller exact-Q checking."
