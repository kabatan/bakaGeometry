  - "geosolver-core/src/preprocess/compression.rs"
  - "geosolver-core/src/preprocess/definitional.rs"
  - "geosolver-core/src/preprocess/linear_affine.rs"
  - "geosolver-core/src/preprocess/binomial.rs"
  - "geosolver-core/src/preprocess/saturation.rs"
  - "geosolver-core/src/preprocess/independent.rs"
functions:
  - name: "pre_kernel_compress"
    file: "geosolver-core/src/preprocess/compression.rs"
    required_by: "Appendix A section 11.1; PLAN.md P4; RGQ-013"
    implementation_status: "implemented"
    evidence:
      - "Runs definitional elimination, linear-affine elimination, binomial simplification, explicit saturation, and target-independent component marking in the required order."
      - "Produces CompressedSystemQ with substitutions, guards, saturations, feasibility obligations, diagnostics, compression trace, and compressed hash."
      - "Records monomial counts, coefficient height before/after, step count, and ordered steps."
  - name: "find_definitional_relations"
    file: "geosolver-core/src/preprocess/definitional.rs"
    required_by: "Appendix A section 11.2; PLAN.md P4"
    implementation_status: "implemented"
    evidence:
      - "Detects y - p(X) and c*y - p(X) with c in Q nonzero by exact affine decomposition."
      - "Does not eliminate the target variable."
      - "Rejects variable-dependent coefficients as definitional candidates."
  - name: "apply_definitional_elimination"
    file: "geosolver-core/src/preprocess/definitional.rs"
    required_by: "Appendix A section 11.2; PLAN.md P4"
    implementation_status: "implemented"
    evidence:
      - "Applies exact polynomial substitution, removes the defining relation, primitive-normalizes remaining relations, and records a SubstitutionKind::Definitional record."
  - name: "find_linear_affine_candidates"
    file: "geosolver-core/src/preprocess/linear_affine.rs"
    required_by: "Appendix A section 11.3; PLAN.md P4"
    implementation_status: "implemented"
    evidence:
      - "Detects a(X)*y + b(X) by exact affine decomposition."
      - "Computes whether denominator is constant nonzero or has an explicit A*s-1 witness."
      - "Computes a polynomial expression only when -b/a divides exactly over Q-polynomials."
  - name: "select_safe_affine_pivots"
    file: "geosolver-core/src/preprocess/linear_affine.rs"
    required_by: "Appendix A section 11.3; PLAN.md P4"
    implementation_status: "implemented"
    evidence:
      - "Selects only exact polynomial substitutions whose pivots are constant nonzero or explicitly guarded nonzero."
      - "Rejects unguarded nonconstant affine pivots."
  - name: "eliminate_linear_affine_variables"
    file: "geosolver-core/src/preprocess/linear_affine.rs"
    required_by: "Appendix A section 11.3; PLAN.md P4"
    implementation_status: "implemented"
    evidence:
      - "Loops until no safe pivot remains."
      - "Records ConstantNonZeroPivot or AffineDenominator guards."
      - "Records LinearAffineConstantPivot or LinearAffineGuardedPivot substitutions."
  - name: "detect_binomial_relations"
    file: "geosolver-core/src/preprocess/binomial.rs"
    required_by: "Appendix A section 11.4; PLAN.md P4"
    implementation_status: "implemented"
    evidence:
      - "Detects monomial/binomial relations with one or two terms after primitive normalization."
  - name: "simplify_binomial_relations"
    file: "geosolver-core/src/preprocess/binomial.rs"
    required_by: "Appendix A section 11.4; PLAN.md P4"
    implementation_status: "implemented"
    evidence:
      - "Primitive-normalizes and deduplicates monomial/binomial relations."
      - "Does not split factors or create union semantics."
  - name: "apply_explicit_saturations"
    file: "geosolver-core/src/preprocess/saturation.rs"
    required_by: "Appendix A section 11.5; PLAN.md P4"
    implementation_status: "implemented"
    evidence:
      - "Detects only polynomial witnesses of the form A*s - 1 = 0."
      - "Records ExplicitNonZeroWitness guards and SaturationRecord entries."
      - "Does not use unbound semantic labels as arbitrary nonzero factor proof."
  - name: "is_explicit_nonzero_factor"
    file: "geosolver-core/src/preprocess/saturation.rs"
    required_by: "Appendix A section 11.5; PLAN.md P4"
    implementation_status: "implemented"
    evidence:
      - "Returns true for nonzero constants only from the factor itself; nonconstant proof is handled by explicit A*s-1 witness extraction."
  - name: "mark_target_independent_components"
    file: "geosolver-core/src/preprocess/independent.rs"
    required_by: "Appendix A section 11.6; PLAN.md P4"
    implementation_status: "implemented"
    evidence:
      - "Builds relation-variable connected components from polynomial incidence."
      - "Removes target-independent components from the candidate-cover relation set."
      - "Stores component records and exact-image feasibility obligations."
  - name: "compute_component_feasibility_obligations"
    file: "geosolver-core/src/preprocess/independent.rs"
    required_by: "Appendix A section 11.6; PLAN.md P4"
    implementation_status: "implemented"
    evidence:
      - "Creates hash-bound FeasibilityObligation records for every component that does not contain the target."
