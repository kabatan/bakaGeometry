phase_id: "P3c"
claim_ceiling_after_phase: "SCAFFOLD_READY"
implemented_files:
  - path: "geosolver-core/src/algebra/groebner.rs"
    functions:
      - name: "groebner_elimination_basis"
        status: "implemented"
        evidence: "Computes a bounded local Buchberger-style elimination basis under a caller-provided elimination order, propagates exact membership certificates through S-pair formation and reductions, verifies each new remainder certificate over Q, and returns finite resource failure when pair or basis caps are exceeded."
      - name: "extract_elimination_generators"
        status: "implemented"
        evidence: "Filters basis polynomials to generators whose variables are all in the keep-variable set."
      - name: "extract_certified_elimination_generators"
        status: "implemented"
        evidence: "Filters certified basis entries to keep-only generators while preserving exact membership certificates."
      - name: "polynomial_in_keep_variables"
        status: "implemented"
        evidence: "Checks variable support against the keep-variable set using exact polynomial variable extraction."
  - path: "geosolver-core/src/algebra/f4.rs"
    functions:
      - name: "f4_reduce_batch"
        status: "implemented"
        evidence: "Performs exact batch reductions over Q using the shared reduction primitive and records matrix row/column trace dimensions."
      - name: "f4_elimination_local"
        status: "implemented"
        evidence: "Builds a local elimination order for eliminate/keep variables, invokes the bounded local Groebner basis path, and returns a LocalF4 local elimination result with certificate validation through the dispatcher helper."
  - path: "geosolver-core/src/algebra/elimination.rs"
    functions:
      - name: "eliminate_to_keep_variables"
        status: "implemented"
        evidence: "Rejects overlapping eliminate/keep sets, dispatches LocalGroebner or LocalF4 strategies, validates every exported generator is in Q[keep], and verifies every membership certificate exactly."
      - name: "local_result_from_groebner"
        status: "implemented"
        evidence: "Converts certified Groebner basis entries into local elimination generators filtered to Q[keep] and records local trace dimensions."
      - name: "validate_local_elimination_result"
        status: "implemented"
        evidence: "Rejects any non-keep-variable export and rejects any invalid membership certificate as an implementation invariant violation."
tests:
  - "algebra::groebner::tests::local_groebner_eliminates_to_keep_variable_with_certificate"
  - "algebra::elimination::tests::dispatcher_checks_disjoint_keep_and_eliminate_sets"
  - "algebra::elimination::tests::dispatcher_exports_keep_only_generator_with_certificate"
  - "algebra::elimination::tests::non_keep_export_is_implementation_bug"
  - "algebra::f4::tests::f4_reduce_batch_reduces_targets_and_records_matrix_shape"
  - "algebra::f4::tests::f4_elimination_local_exports_keep_only_generators_with_certificates"
not_implemented_in_this_phase:
  - "UniversalTargetEliminationKernel execution plan and fixed strategy sequence; later P8d owns global Universal admission/execution."
  - "Relation search, sparse resultant, and specialization/interpolation kernels; later phases own these strategies."
  - "Any coordinate root enumeration, full coordinate RUR, global coordinate lex parametrization, or nonfinite certification."
  - "Final acceptance of local elimination output as target support without later exact pipeline verification."
