phase_id: "P11"
functions:
  - function: "KernelCertificate::from_execution_plan_with_payload"
    file: "geosolver-core/src/verify/certificates.rs"
    status: "implemented"
    evidence: "Binds route, plan hash, source relation hashes, output relation hashes, exported variables, and route-specific payload into the binding hash."
  - function: "KernelCertificatePayload"
    file: "geosolver-core/src/verify/certificates.rs"
    status: "implemented"
    evidence: "Defines route-specific proof payloads for all P7-P10 projection kernels plus Universal wrapping. BindingOnly and SyntheticForTests are non-verifying sentinel variants rejected by the verifier."
  - function: "verify_projection_message"
    file: "geosolver-core/src/verify/verify_message.rs"
    status: "implemented"
    evidence: "Checks package hash, block/exported-variable authorization, generator variables, source authorization, certificate route, source/output relation hashes, binding hash, and exact payload replay."
  - function: "verify_payload_for_outputs"
    file: "geosolver-core/src/verify/verify_message.rs"
    status: "implemented"
    evidence: "Replays target support, membership, guarded affine, resultant, target-action, regular-chain, norm-trace, specialization/interpolation, and Universal proof payloads against message outputs."
  - function: "verify_sparse_resultant_payload"
    file: "geosolver-core/src/verify/verify_message.rs"
    status: "implemented"
    evidence: "Checks resultant certificates through a generated closure from authorized sources and requires message outputs to match generated raw or primitive resultant hashes."
  - function: "payload_source_hashes"
    file: "geosolver-core/src/verify/verify_message.rs"
    status: "implemented"
    evidence: "Collects source polynomial hashes for every proof payload and recursively includes Universal inner_payload source hashes before replay authorization."
  - function: "verify_tower_plan_hashes"
    file: "geosolver-core/src/algebra/norm_trace.rs"
    status: "implemented"
    evidence: "Requires NormTrace source hashes to cover target expression and minimal polynomial bodies, then recomputes step hashes and tower hash before accepting tower norm replay."
  - function: "verify_target_action_payload"
    file: "geosolver-core/src/verify/verify_message.rs"
    status: "implemented"
    evidence: "Rebuilds the production quotient handle from payload evidence, reruns Krylov recurrence recovery, verifies characteristic coverage and annihilator, and compares the exact output relation."
  - function: "verify_regular_chain_payload"
    file: "geosolver-core/src/verify/verify_message.rs"
    status: "implemented"
    evidence: "Rebuilds the regular-chain DAG from source relations, variable order, and guards; recomputes projections and combined output generators."
  - function: "exact_replay_result"
    file: "geosolver-core/src/kernels/traits.rs"
    status: "implemented"
    evidence: "Delegates public kernel replay acceptance to verify_projection_message and is called by all nine public kernel replay implementations; the old structural basic_replay_result helper was removed."
  - function: "verify_global_support"
    file: "geosolver-core/src/verify/verify_support.rs"
    status: "implemented"
    evidence: "Recomputes exact squarefree product of target-only root relations and rejects mismatched support."
  - function: "build_core_run_certificate"
    file: "geosolver-core/src/verify/run_certificate.rs"
    status: "implemented"
    evidence: "Records supplied input/canonical/compression/hypergraph/DAG/message/support/root/candidate replay hashes, global support certificate hash, P11-scoped invariant flags, and invariant evidence hash."
  - function: "hash_projection_message_dag_binding"
    file: "geosolver-core/src/verify/run_certificate.rs"
    status: "implemented"
    evidence: "Binds the run certificate's target projection DAG field to target variable, ordered projection message certificates, and derived message dependency edges."
  - function: "hash_projection_message_dag_binding_with_authorized_sources"
    file: "geosolver-core/src/verify/run_certificate.rs"
    status: "implemented"
    evidence: "Binds derived message dependency edges while treating replay input relation hashes and input polynomial hashes as base-authorized sources."
  - function: "projection_message_dependency_indices"
    file: "geosolver-core/src/verify/run_certificate.rs"
    status: "implemented"
    evidence: "Derives message-to-message dependencies from certificate and payload source relation hashes, skips base-authorized source hashes, rejects cyclic graphs, and feeds replay KernelContext child_messages with only derived dependencies."
  - function: "hash_invariant_evidence"
    file: "geosolver-core/src/verify/run_certificate.rs"
    status: "implemented"
    evidence: "Binds invariant flags to concrete input, projection message, support, squarefree support, root isolation, and decoded candidate hashes."
  - function: "derive_core_invariant_flags"
    file: "geosolver-core/src/verify/run_certificate.rs"
    status: "implemented"
    evidence: "Derives P11 replay invariant flags from verifiable payload presence, no-coordinate export evidence, and projection-plan binding; unsupported final anti-dispatch/QE-CAD flags remain false rather than bare true."
  - function: "replay_run_certificate"
    file: "geosolver-core/src/verify/replay.rs"
    status: "implemented"
    evidence: "Recomputes input, canonical, compressed-system, hypergraph, projection DAG, projection message, kernel plan, support, support certificate, squarefree, root, candidate, invariant checks, and calls verify_projection_message for every message."
tests:
  - name: "p11_replay_fails_when_projection_message_is_deleted"
    file: "geosolver-core/src/verify/replay.rs"
    covers: ["semantic deletion", "projection message hash replay"]
  - name: "p11_replay_fails_on_support_root_and_candidate_tamper"
    file: "geosolver-core/src/verify/replay.rs"
    covers: ["support tamper", "root isolation tamper", "decoded candidate tamper"]
  - name: "p11_global_support_rejects_tampered_support_relation"
    file: "geosolver-core/src/verify/replay.rs"
    covers: ["global support exact proof"]
  - name: "p11_verify_projection_message_rejects_synthetic_and_tampered_certificates"
    file: "geosolver-core/src/verify/replay.rs"
    covers: ["certificate binding", "synthetic certificate rejection"]
  - name: "p11_replay_rejects_synthetic_projection_certificate_even_when_hashes_match"
    file: "geosolver-core/src/verify/replay.rs"
    covers: ["replay-level projection verification", "hash-consistent synthetic certificate rejection"]
  - name: "p11_replay_fails_on_input_canonical_dag_plan_and_squarefree_tamper"
    file: "geosolver-core/src/verify/replay.rs"
    covers: ["input tamper", "canonical tamper", "compression hash tamper", "hypergraph hash tamper", "DAG tamper", "kernel plan tamper", "support certificate tamper", "invariant evidence tamper", "squarefree support tamper"]
  - name: "p11_rejects_forged_target_action_payload_in_message_and_kernel_replay"
    file: "geosolver-core/src/verify/replay.rs"
    covers: ["target-action exact quotient replay", "hash-consistent forged characteristic relation rejection", "public TargetAction kernel replay rejection"]
  - name: "p11_rejects_forged_regular_chain_payload_in_message_and_kernel_replay"
    file: "geosolver-core/src/verify/replay.rs"
    covers: ["regular-chain DAG/projection replay", "hash-consistent forged projection generator rejection", "public RegularChain kernel replay rejection"]
  - name: "p11_rejects_forged_sparse_resultant_payload_in_message_and_kernel_replay"
    file: "geosolver-core/src/verify/replay.rs"
    covers: ["sparse-resultant generated-closure replay", "hash-consistent forged resultant output rejection", "public SparseResultant kernel replay rejection"]
  - name: "p11_rejects_forged_norm_trace_payload_source_and_tower_hash"
    file: "geosolver-core/src/verify/replay.rs"
    covers: ["norm-trace source authorization", "norm-trace tower hash replay", "public NormTrace kernel replay rejection"]
  - name: "p11_rejects_universal_inner_payload_with_unauthorized_sources"
    file: "geosolver-core/src/verify/replay.rs"
    covers: ["Universal inner payload recursive source authorization", "public Universal kernel replay rejection", "run-certificate replay rejection with recomputed hashes"]
  - name: "p11_replay_rejects_mutual_projection_message_source_cycle"
    file: "geosolver-core/src/verify/replay.rs"
    covers: ["run-certificate dependency DAG acyclicity", "message dependency binding", "mutual forged projection-message source rejection"]
  - name: "p11_replay_accepts_duplicate_hash_when_source_is_input_authorized"
    file: "geosolver-core/src/verify/replay.rs"
    covers: ["input-authorized source handling", "duplicate source/output hash regression", "non-cyclic run replay acceptance"]
