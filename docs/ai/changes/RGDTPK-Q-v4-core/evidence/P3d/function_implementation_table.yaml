phase_id: "P3d"
claim_ceiling_after_phase: "SCAFFOLD_READY"
implemented_files:
  - path: "geosolver-core/src/algebra/resultant.rs"
    functions:
      - name: "support_sets"
        status: "implemented"
        evidence: "Computes deterministic monomial support sets, variable lists, and support hashes for sparse polynomials."
      - name: "build_sparse_resultant_template"
        status: "implemented"
        evidence: "Builds a bounded two-polynomial one-eliminate-variable Sylvester resultant template after validating variables are restricted to eliminate plus duplicate-free keep variables in canonical ascending order, rejecting eliminate/keep overlap, and enforcing matrix caps."
      - name: "compute_resultant_relation"
        status: "implemented"
        evidence: "Computes an exact Q Sylvester resultant candidate, records modular relation hashes for selected denominator-safe primes, and marks the output CandidateOnlyRequiresExactMembership."
      - name: "verify_resultant_certificate"
        status: "implemented"
        evidence: "Rebuilds the template, recomputes the exact resultant, checks relation/template hashes, validates trace moduli are prime and usable for all rational denominators, and checks modular trace hashes without panicking on tampered primes."
  - path: "geosolver-core/src/algebra/interpolation.rs"
    functions:
      - name: "choose_specialization_points"
        status: "implemented"
        evidence: "Chooses deterministic rational specialization assignments from variable order, count, and prime."
      - name: "specialize_polynomials"
        status: "implemented"
        evidence: "Uses exact polynomial substitution to specialize selected variables to rational constants."
      - name: "interpolate_sparse_coefficients"
        status: "implemented"
        evidence: "Performs exact univariate Lagrange interpolation of sparse relation coefficients over Q and rejects invalid sample configurations."
      - name: "verify_interpolated_relation"
        status: "implemented"
        evidence: "Rejects relation hash mismatches and verifies every sample by exact re-specialization of the interpolated relation."
      - name: "build_interpolation_certificate"
        status: "implemented"
        evidence: "Packages relation hash, samples, specialized variables, and candidate-only proof status for exact sample verification."
tests:
  - "algebra::resultant::tests::resultant_support_template_and_certificate_are_exact"
  - "algebra::resultant::tests::resultant_certificate_rejects_tampered_relation_hash"
  - "algebra::resultant::tests::resultant_template_rejects_non_keep_variables"
  - "algebra::resultant::tests::resultant_template_rejects_overlapping_or_duplicate_keep_variables"
  - "algebra::resultant::tests::resultant_template_rejects_noncanonical_keep_order"
  - "algebra::resultant::tests::resultant_certificate_rejects_tampered_trace_prime_without_panic"
  - "algebra::resultant::tests::resultant_certificate_rejects_nonprime_trace_modulus"
  - "algebra::interpolation::tests::specialization_points_are_deterministic_and_specialization_is_exact"
  - "algebra::interpolation::tests::sparse_coefficient_interpolation_reconstructs_relation_candidate"
  - "algebra::interpolation::tests::bad_interpolation_sample_fails_final_verification"
not_implemented_in_this_phase:
  - "SparseResultantProjectionKernel admission/execution and ProjectionMessage production; later P8b owns kernel integration."
  - "SpecializationInterpolationKernel admission/execution and inner-kernel orchestration; later P8b owns kernel integration."
  - "Final acceptance of resultant or interpolated relations without exact membership/elimination verification by later pipeline phases."
  - "Any coordinate root enumeration, full coordinate RUR, exact-image status, candidate-cover status, or nonfinite target-image certification."
