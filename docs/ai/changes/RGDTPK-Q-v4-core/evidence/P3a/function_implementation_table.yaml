phase_id: "P3a"
claim_ceiling_after_phase: "SCAFFOLD_READY"
implemented_files:
  - path: "geosolver-core/src/algebra/monomial_order.rs"
    functions:
      - name: "elimination_order"
        status: "implemented"
        evidence: "Returns a MonomialOrder::Elimination with eliminate variables ordered before keep variables."
      - name: "grevlex_order"
        status: "implemented"
        evidence: "Returns a deterministic graded reverse lexicographic order over declared variables."
      - name: "lex_order"
        status: "implemented"
        evidence: "Returns a deterministic lexicographic order over declared variables."
      - name: "block_order"
        status: "implemented"
        evidence: "Returns a block lexicographic order over declared variable blocks."
  - path: "geosolver-core/src/algebra/polynomial_ops.rs"
    functions:
      - name: "leading_term"
        status: "implemented"
        evidence: "Selects the order-maximal term with deterministic monomial tie-break."
      - name: "s_polynomial"
        status: "implemented"
        evidence: "Builds the LCM-leading-monomial combination and divides by leading coefficients over Q."
      - name: "reduce_by_set"
        status: "implemented"
        evidence: "Performs exact multivariate division, returns quotients and remainder, and uses coefficient division over Q."
      - name: "content_primitive_part"
        status: "implemented"
        evidence: "Constructs a primitive integer polynomial and exact rational content whose product reconstructs the input."
  - path: "geosolver-core/src/algebra/normal_form.rs"
    functions:
      - name: "normal_form"
        status: "implemented"
        evidence: "Delegates to exact reduce_by_set and returns the exact remainder."
      - name: "verify_membership_by_certificate"
        status: "implemented"
        evidence: "Reconstructs sum(multiplier_i * relations[relation_id_i]) over Q and checks sum - g normalizes to zero."
tests:
  - "algebra::polynomial_ops::tests::leading_term_uses_declared_order"
  - "algebra::polynomial_ops::tests::s_polynomial_cancels_leading_terms"
  - "algebra::polynomial_ops::tests::reduction_respects_coefficients_and_records_quotients"
  - "algebra::polynomial_ops::tests::content_and_primitive_part_reconstruct_input"
  - "algebra::normal_form::tests::normal_form_returns_exact_remainder"
  - "algebra::normal_form::tests::correct_membership_certificate_reconstructs_identity"
  - "algebra::normal_form::tests::incorrect_membership_certificate_fails_exact_identity"
  - "algebra::normal_form::tests::out_of_range_relation_reference_fails"
not_implemented_in_this_phase:
  - "P3b modular arithmetic, CRT, rational reconstruction, and matrix solving."
  - "P3c local Groebner/F4 elimination APIs."
  - "P3d resultants and interpolation."
  - "P3e quotient/action coverage."
  - "P3f regular-chain, norm/trace, real-root, and sign primitives."
  - "P11 full kernel/global certificate verification and replay."
