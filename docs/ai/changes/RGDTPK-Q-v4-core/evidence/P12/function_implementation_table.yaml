phase_id: "P12"
functions:
  - function: "squarefree_support"
    file: "geosolver-core/src/roots/squarefree.rs"
    status: "implemented"
    evidence: "Rejects zero support and computes the exact squarefree support through derivative/gcd-backed univariate squarefree normalization."
  - function: "RootIsolationOptions"
    file: "geosolver-core/src/roots/isolate.rs"
    status: "implemented"
    evidence: "Public P12 root isolation options select the exact root isolation method."
  - function: "isolate_real_roots"
    file: "geosolver-core/src/roots/isolate.rs"
    status: "implemented"
    evidence: "Calls squarefree_support and dispatches to exact Sturm or Descartes-selected exact isolation, then binds root indices and support hash."
  - function: "isolate_real_roots_sturm_with_max_width"
    file: "geosolver-core/src/algebra/real_root.rs"
    status: "implemented"
    evidence: "Uses exact Sturm counts and rational bisection to isolate roots under a positive rational interval-width bound."
  - function: "RationalQ::Ord"
    file: "geosolver-core/src/types/rational.rs"
    status: "implemented"
    evidence: "Uses exact cross-product comparison instead of lexicographic numerator/denominator comparison, making interval operations exact for rational endpoints."
  - function: "TargetCandidate"
    file: "geosolver-core/src/roots/decode.rs"
    status: "implemented"
    evidence: "Carries target, support hash, root index, isolating interval, and candidate hash."
  - function: "decode_candidates"
    file: "geosolver-core/src/roots/decode.rs"
    status: "implemented"
    evidence: "Builds one candidate per real root and binds it to the exact support hash/root index/isolating interval."
  - function: "finalize_candidate_cover_result"
    file: "geosolver-core/src/compose/final_support.rs"
    status: "implemented"
    evidence: "Production support-producing result finalizer computes exact squarefree support, exact root isolation, and decoded candidates before returning CertifiedCandidateCover."
  - function: "hash_target_candidate"
    file: "geosolver-core/src/roots/decode.rs"
    status: "implemented"
    evidence: "Hashes target, support hash, root index, and rational interval endpoints."
  - function: "AlgebraicRootRecord"
    file: "geosolver-core/src/roots/algebraic_number.rs"
    status: "implemented"
    evidence: "Concrete algebraic root record with support polynomial, support hash, root index, isolating interval, and root hash."
  - function: "algebraic_roots_from_support"
    file: "geosolver-core/src/roots/algebraic_number.rs"
    status: "implemented"
    evidence: "Creates algebraic root records from exact isolation results and rejects support-hash mismatch when converting records."
  - function: "refine_algebraic_root_to_width"
    file: "geosolver-core/src/roots/algebraic_number.rs"
    status: "implemented"
    evidence: "Re-isolates the support polynomial with exact Sturm refinement under a rational width bound and returns an error if the root index is missing."
  - function: "compare_algebraic_roots"
    file: "geosolver-core/src/roots/algebraic_number.rs"
    status: "implemented"
    evidence: "Compares equal records by support/root index and disjoint rational intervals by exact rational ordering."
  - function: "hash_decoded_candidates"
    file: "geosolver-core/src/verify/run_certificate.rs"
    status: "implemented"
    evidence: "Includes candidate target, support hash, root index, isolating interval, and candidate hash."
  - function: "verify_roots_and_candidates"
    file: "geosolver-core/src/verify/replay.rs"
    status: "implemented"
    evidence: "Requires one decoded candidate per isolated real root, rejects duplicate/omitted candidates, checks candidate target/support hash/root index/interval, and recomputes candidate_hash during run replay."
tests:
  - name: "p12_squarefree_rejects_zero_and_removes_repeated_factors"
    file: "geosolver-core/src/roots/mod.rs"
    covers: ["zero support rejection", "repeated factor squarefree"]
  - name: "p12_exact_isolation_handles_no_real_one_rational_and_multiple_rational_roots"
    file: "geosolver-core/src/roots/mod.rs"
    covers: ["no real roots", "one rational root", "multiple rational roots"]
  - name: "p12_exact_isolation_handles_irrational_repeated_and_high_coefficient_roots"
    file: "geosolver-core/src/roots/mod.rs"
    covers: ["irrational roots", "repeated roots", "high coefficient roots"]
  - name: "p12_decode_candidates_bind_target_support_index_interval_and_hash"
    file: "geosolver-core/src/roots/mod.rs"
    covers: ["candidate target binding", "support hash binding", "root index binding", "interval binding", "candidate hash binding"]
  - name: "p12_algebraic_records_bind_interval_hash_and_compare_disjoint_roots"
    file: "geosolver-core/src/roots/mod.rs"
    covers: ["algebraic root hash binding", "interval comparison", "exact rational refinement"]
  - name: "p12_replay_rejects_candidate_omission_and_duplicates_even_when_hashes_match"
    file: "geosolver-core/src/verify/replay.rs"
    covers: ["candidate omission replay rejection", "duplicate candidate replay rejection", "self-consistent run hash recomputation"]
  - name: "p12_candidate_cover_finalizer_returns_exact_roots_and_nonplaceholder_candidates"
    file: "geosolver-core/tests/p12_roots_decode_integration.rs"
    covers: ["support-producing integration", "exact root isolation in result", "non-placeholder decoded candidates"]
