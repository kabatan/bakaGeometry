phase_id: "P5"
claim_ceiling_after_phase: "SCAFFOLD_READY"
owned_files:
  - "geosolver-core/src/graph/hypergraph.rs"
  - "geosolver-core/src/graph/influence.rs"
  - "geosolver-core/src/graph/weighted_primal.rs"
  - "geosolver-core/src/graph/separators.rs"
  - "geosolver-core/src/graph/tree_decomposition.rs"
  - "geosolver-core/src/graph/projection_dag.rs"
  - "geosolver-core/src/graph/metrics.rs"
functions:
  - name: "build_relation_variable_hypergraph"
    file: "geosolver-core/src/graph/hypergraph.rs"
    required_by: "Appendix A section 12; PLAN.md P5; RGQ-014"
    implementation_status: "implemented"
    evidence:
      - "Traverses every compressed relation polynomial and records all variables from `poly_variables` in relation_to_variables and variable_to_relations."
      - "Computes a deterministic hypergraph hash from relation ids and variable ids."
      - "Test `hypergraph_represents_every_polynomial_occurrence` checks every compressed relation occurrence against `poly_variables`."
  - name: "connected_components"
    file: "geosolver-core/src/graph/hypergraph.rs"
    required_by: "Appendix A section 12; PLAN.md P5"
    implementation_status: "implemented"
    evidence:
      - "Performs bipartite BFS over relation-variable incidence and records relation ids, variables, and component hash."
  - name: "relation_variables"
    file: "geosolver-core/src/graph/hypergraph.rs"
    required_by: "Appendix A section 12; PLAN.md P5"
    implementation_status: "implemented"
    evidence:
      - "Returns the stored BTreeSet of variables for a relation id."
  - name: "variable_relations"
    file: "geosolver-core/src/graph/hypergraph.rs"
    required_by: "Appendix A section 12; PLAN.md P5"
    implementation_status: "implemented"
    evidence:
      - "Returns the stored BTreeSet of relation ids for a variable id."
  - name: "build_target_influence_graph"
    file: "geosolver-core/src/graph/influence.rs"
    required_by: "Appendix A section 12; PLAN.md P5; RGQ-014"
    implementation_status: "implemented"
    evidence:
      - "Selects the hypergraph component containing the target and records all other components as independent influence components."
      - "Creates a deterministic influence hash."
  - name: "build_weighted_primal_graph"
    file: "geosolver-core/src/graph/weighted_primal.rs"
    required_by: "Appendix A section 12; PLAN.md P5; RGQ-033"
    implementation_status: "implemented"
    evidence:
      - "Builds primal graph edges only from variables co-occurring in compressed polynomial relations."
      - "Records edge-to-relation incidence and algebraic variable/edge weights."
      - "Test `weighted_primal_weights_are_algebraic_only` checks degree, monomial, occurrence, and algebraic edge incidence contributions."
  - name: "variable_weight"
    file: "geosolver-core/src/graph/weighted_primal.rs"
    required_by: "Appendix A section 12; PLAN.md P5; RGQ-033"
    implementation_status: "implemented"
    evidence:
      - "Uses only polynomial degree participation, monomial count, coefficient height bits, occurrence count, and target influence distance."
  - name: "edge_weight"
    file: "geosolver-core/src/graph/weighted_primal.rs"
    required_by: "Appendix A section 12; PLAN.md P5; RGQ-033"
    implementation_status: "implemented"
    evidence:
      - "Uses only relation-incidence count for the edge; no geometry names, fixtures, or coordinates."
  - name: "articulation_variable_candidates"
    file: "geosolver-core/src/graph/separators.rs"
    required_by: "Appendix A section 12; PLAN.md P5; RGQ-033"
    implementation_status: "implemented"
    evidence:
      - "Computes algebraic graph articulation candidates by removing variables from the weighted primal graph."
      - "Test `articulation_candidate_is_algebraic_incidence_based` uses a pure polynomial incidence chain."
  - name: "min_fill_separator_candidates"
    file: "geosolver-core/src/graph/separators.rs"
    required_by: "Appendix A section 12; PLAN.md P5; RGQ-033"
    implementation_status: "implemented"
    evidence:
      - "Creates deterministic candidate separators from graph variables sorted by graph degree and variable id."
  - name: "score_separator"
    file: "geosolver-core/src/graph/separators.rs"
    required_by: "Appendix A section 12; PLAN.md P5; RGQ-033"
    implementation_status: "implemented"
    evidence:
      - "Scores by component size, separator width, and component count using the cost model."
  - name: "build_target_rooted_decomposition"
    file: "geosolver-core/src/graph/tree_decomposition.rs"
    required_by: "Appendix A section 12; PLAN.md P5; RGQ-033"
    implementation_status: "implemented"
    evidence:
      - "Recursively applies only useful separators that reduce the maximum child variable set."
      - "If no useful separator exists, leaves the root as one large target block."
      - "Test `no_useful_separator_keeps_one_large_root` covers the no-separator path."
  - name: "build_target_projection_dag"
    file: "geosolver-core/src/graph/projection_dag.rs"
    required_by: "Appendix A section 12; PLAN.md P5; RGQ-038"
    implementation_status: "implemented"
    evidence:
      - "Materializes decomposition nodes into projection blocks and assigns each compressed relation exactly once to the smallest block containing all relation variables."
      - "Builds a one-block DAG for no-separator systems."
      - "Validates the DAG before returning it."
  - name: "authorize_block_relations"
    file: "geosolver-core/src/graph/projection_dag.rs"
    required_by: "Appendix A section 12; PLAN.md P5; RGQ-038"
    implementation_status: "implemented"
    evidence:
      - "Hashes block id, parent id, local variables, exported variables, child ids, relation ids, and relation hashes."
      - "Authorization hash therefore constrains exactly which compressed relations a projector block may read."
  - name: "validate_projection_dag"
    file: "geosolver-core/src/graph/projection_dag.rs"
    required_by: "Appendix A section 12; PLAN.md P5; RGQ-038"
    implementation_status: "implemented"
    evidence:
      - "Rejects duplicate block ids, missing root, child/parent mismatch, authorization mismatch, block hash mismatch, unknown relation ids, relation variables outside the block, omitted compressed relations, and relation duplication without certificate."
      - "Tests cover authorization tamper, relation deletion, relation duplication without certificate, and no-separator one-block construction."
  - name: "structural_metrics"
    file: "geosolver-core/src/graph/metrics.rs"
    required_by: "Appendix A section 12; PLAN.md P5; RGQ-033"
    implementation_status: "implemented"
    evidence:
      - "Computes local variable count, authorized relation count, monomial count, max degree, separator width, and coefficient height from authorized relations only."
  - name: "estimate_local_quotient_rank"
    file: "geosolver-core/src/graph/metrics.rs"
    required_by: "Appendix A section 12; PLAN.md P5; RGQ-033"
    implementation_status: "implemented"
    evidence:
      - "Computes deterministic local structural rank estimate from local variables and relation count."
  - name: "estimate_sparse_template_size"
    file: "geosolver-core/src/graph/metrics.rs"
    required_by: "Appendix A section 12; PLAN.md P5; RGQ-033"
    implementation_status: "implemented"
    evidence:
      - "Computes deterministic row/column/nonzero hints from block-local variables, exports, and relation count."
  - name: "estimate_coefficient_growth"
    file: "geosolver-core/src/graph/metrics.rs"
    required_by: "Appendix A section 12; PLAN.md P5; RGQ-033"
    implementation_status: "implemented"
    evidence:
      - "Computes a deterministic structural coefficient-growth estimate for block planning."
tests:
  focused:
    - "graph: 9 passed after test-oracle correction"
  full_crate: "97 passed"
semantic_deletion_challenges:
  - "graph::projection_dag::tests::relation_deletion_fails_validation"
tamper_challenges:
  - "graph::projection_dag::tests::authorization_mismatch_fails_validation"
known_boundaries:
  - "P5 builds graph, decomposition, authorization-bound TargetProjectionDAG, and metrics only."
  - "P5 does not implement planner admission, kernel execution, projection messages, candidate cover, exact image, replay certificates, root isolation, or public orchestration."
  - "MECH-004 closure requires Guardian reviewer confirmation; this evidence does not self-close it."
