      - "Requires exactly one non-exported algebraic variable."
      - "Requires a univariate minimal-polynomial candidate in that algebraic variable."
      - "Requires a target-minus-expression relation over exported variables plus the algebraic variable."
      - "Rejects noncanonical exported variable lists."
  - name: "norm_of_target_minus_expression"
    file: "geosolver-core/src/algebra/norm_trace.rs"
    required_by: "Appendix A section 10.17; PLAN.md P3f; RGQ-024"
    implementation_status: "implemented"
    evidence:
      - "Validates the expression uses only exported variables plus the algebraic variable."
      - "Computes the norm relation as the exact Sylvester resultant of the minimal polynomial and target-minus-expression."
      - "Primitive-normalizes the resultant over Q."
      - "Returns AlgorithmicHardCase for zero or algebraic-variable-independent norm inputs."
  - name: "verify_norm_relation"
    file: "geosolver-core/src/algebra/norm_trace.rs"
    required_by: "Appendix A section 10.17; PLAN.md P3f; RGQ-024"
    implementation_status: "implemented"
    evidence:
      - "Recomputes the norm from the TowerDescription target-minus-expression."
      - "Compares primitive-normalized relations so nonzero resultant scalar convention cannot invalidate a true relation."
      - "Rejects tampered norm relations in tests."
