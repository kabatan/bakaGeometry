phase_id: "P3e"
claim_ceiling_after_phase: "SCAFFOLD_READY"
implemented_files:
  - path: "geosolver-core/src/algebra/quotient.rs"
    functions:
      - name: "TargetQuotientHandle"
        status: "implemented"
        evidence: "Trait exposes basis id, finite basis size/scope, exact normal_form, multiply_by_variable, no_coordinate_solution_export, basis polynomial access for verification, and stable hashes; it exposes no coordinate roots or full coordinate RUR APIs."
      - name: "build_target_relevant_quotient_handle"
        status: "implemented"
        evidence: "Builds an explicit target-relevant quotient handle only when basis/action dimensions are consistent and coordinate-root/full-RUR export flags are false."
      - name: "ExplicitTargetQuotientHandle::normal_form"
        status: "implemented"
        evidence: "Computes exact normal forms by applying declared variable action matrices to the constant basis vector and exact Q coefficients."
      - name: "ExplicitTargetQuotientHandle::multiply_by_variable"
        status: "implemented"
        evidence: "Applies exact variable action matrix columns to a quotient vector over Q."
  - path: "geosolver-core/src/algebra/krylov.rs"
    functions:
      - name: "block_krylov_sequence"
        status: "implemented"
        evidence: "Builds deterministic Krylov sequences from explicit start vectors using handle.multiply_by_variable, rejecting coordinate-exporting handles and dimension mismatches."
      - name: "recover_recurrence"
        status: "implemented"
        evidence: "Recovers a monic exact recurrence from all Krylov block vectors by exact linear solving over Q."
      - name: "certify_krylov_coverage"
        status: "implemented"
        evidence: "Accepts only recurrence equal to the exact characteristic polynomial of the verified target-action matrix; verifies every action column by exact normal_form and checks Cayley-Hamilton exactly."
      - name: "verify_annihilator"
        status: "implemented"
        evidence: "Accepts only the verified characteristic support polynomial and exact Cayley-Hamilton matrix verification."
tests:
  - "algebra::quotient::tests::explicit_handle_exposes_no_coordinate_solution_api_and_normal_forms_exactly"
  - "algebra::krylov::tests::verified_characteristic_support_coverage_is_accepted"
  - "algebra::krylov::tests::single_vector_krylov_undercoverage_is_rejected"
not_implemented_in_this_phase:
  - "TargetActionKrylovKernel admission/execution and ProjectionMessage production; later P8c owns kernel integration."
  - "Candidate-cover support verification and root isolation after characteristic support; later phases own those checks."
  - "Any relation accepted from a single-vector Krylov sequence, block Wiedemann claim, trace-power claim, or unverified S(M_T)=0."
  - "Any coordinate root enumeration or full coordinate RUR export."
